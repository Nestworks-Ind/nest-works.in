<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NestWorks Debug</title>
  <style>
    body { font-family: monospace; padding: 24px; background: #f8fafc; }
    h2 { font-size: 16px; margin-bottom: 12px; }
    .box { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
    .ok  { color: #16a34a; font-weight: bold; }
    .err { color: #dc2626; font-weight: bold; }
    .inf { color: #2563eb; }
    pre  { white-space: pre-wrap; word-break: break-all; font-size: 12px; margin-top: 8px; background: #f1f5f9; padding: 10px; border-radius: 6px; }
    button { padding: 8px 16px; background: #6366f1; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; margin-right: 8px; }
    input  { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; font-family: monospace; font-size: 12px; margin-top: 4px; box-sizing: border-box; }
    label  { font-size: 12px; color: #64748b; }
  </style>
</head>
<body>

<h2>NestWorks — Supabase Connection Debug</h2>
<p style="font-size:13px;color:#475569;margin-bottom:16px">
  This page tests your Supabase connection and shows exactly what is failing.
  Fill in your values below and click Run Tests.
</p>

<div class="box">
  <label>Your Supabase Project URL</label>
  <input id="url" placeholder="https://abcdefgh.supabase.co" />
  <label style="margin-top:10px;display:block">Your Supabase Anon Key</label>
  <input id="anon" placeholder="eyJhbGci..." />
  <br><br>
  <button onclick="runAll()">▶ Run All Tests</button>
  <button onclick="document.getElementById('out').innerHTML=''" style="background:#64748b">Clear</button>
</div>

<div class="box" id="out">
  <span style="color:#94a3b8">Results will appear here after running tests…</span>
</div>

<script>
const out = document.getElementById('out');

function log(msg, type='inf') {
  const d = document.createElement('div');
  d.style.padding = '4px 0';
  d.style.borderBottom = '1px solid #f1f5f9';
  d.innerHTML = `<span class="${type}">${msg}</span>`;
  out.appendChild(d);
}

function logPre(label, data) {
  const d = document.createElement('div');
  d.innerHTML = `<div style="font-size:12px;color:#64748b;margin-top:8px">${label}</div><pre>${JSON.stringify(data, null, 2)}</pre>`;
  out.appendChild(d);
}

async function runAll() {
  out.innerHTML = '';
  const SB_URL  = document.getElementById('url').value.trim().replace(/\/$/, '');
  const SB_ANON = document.getElementById('anon').value.trim();

  if (!SB_URL || !SB_ANON) {
    log('⚠ Please fill in both URL and Anon Key above', 'err');
    return;
  }

  log('━━━ TEST 1: Basic connectivity ━━━');
  try {
    const r = await fetch(SB_URL + '/rest/v1/', {
      headers: { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON }
    });
    log(`Status: ${r.status} ${r.statusText}`, r.ok ? 'ok' : 'err');
    if (r.ok) log('✓ Supabase URL and anon key are reachable', 'ok');
    else {
      const t = await r.text();
      log('✗ Connection failed — check your URL and anon key', 'err');
      logPre('Response', t);
      return;
    }
  } catch(e) {
    log('✗ Network error: ' + e.message, 'err');
    log('→ Check if URL is correct and Supabase project is active', 'err');
    return;
  }

  log('━━━ TEST 2: Read plans table ━━━');
  try {
    const r = await fetch(SB_URL + '/rest/v1/plans?select=*', {
      headers: { 'apikey': SB_ANON, 'Authorization': 'Bearer ' + SB_ANON }
    });
    const data = await r.json();
    log(`Status: ${r.status}`, r.ok ? 'ok' : 'err');
    if (!r.ok) {
      log('✗ Cannot read plans table', 'err');
      logPre('Error response', data);
      log('→ Run fix_plans_rls.sql in Supabase SQL Editor', 'err');
    } else if (!Array.isArray(data) || data.length === 0) {
      log('⚠ Plans table is empty or returned wrong format', 'err');
      logPre('Raw response', data);
      log('→ Run supabase_v3.sql to insert Trial, Professional, Team plans', 'err');
    } else {
      log(`✓ Found ${data.length} plans`, 'ok');
      logPre('Plans data', data);
    }
  } catch(e) {
    log('✗ Error reading plans: ' + e.message, 'err');
  }

  log('━━━ TEST 3: RLS policy check ━━━');
  try {
    const r = await fetch(SB_URL + '/rest/v1/plans?select=id,name&limit=1', {
      headers: {
        'apikey': SB_ANON,
        'Authorization': 'Bearer ' + SB_ANON,
        'Accept': 'application/json'
      }
    });
    const data = await r.json();
    if (Array.isArray(data) && data.length > 0) {
      log('✓ RLS allows anon key to read plans', 'ok');
    } else if (Array.isArray(data) && data.length === 0) {
      log('⚠ RLS is blocking — empty array returned', 'err');
      log('→ Run this in Supabase SQL Editor:', 'err');
      const pre = document.createElement('pre');
      pre.textContent = `DROP POLICY IF EXISTS "plans_read" ON plans;
DROP POLICY IF EXISTS "plans_read_public" ON plans;
DROP POLICY IF EXISTS "anyone can read active plans" ON plans;

CREATE POLICY "plans_public_read"
  ON plans FOR SELECT
  TO anon, authenticated
  USING (true);`;
      out.appendChild(pre);
    } else {
      logPre('Unexpected response', data);
    }
  } catch(e) {
    log('✗ RLS test error: ' + e.message, 'err');
  }

  log('━━━ TEST 4: Check plans count via SQL ━━━');
  try {
    const r = await fetch(SB_URL + '/rest/v1/plans?select=count', {
      headers: {
        'apikey': SB_ANON,
        'Authorization': 'Bearer ' + SB_ANON,
        'Prefer': 'count=exact',
        'Accept': 'application/json'
      }
    });
    const count = r.headers.get('content-range');
    log(`Content-Range header: ${count || 'not returned'}`, 'inf');
    const data = await r.json();
    logPre('Count response', data);
  } catch(e) {
    log('✗ Count test error: ' + e.message, 'err');
  }

  log('━━━ All tests complete ━━━', 'ok');
}
</script>
</body>
</html>
